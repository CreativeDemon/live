<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Rumi</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="girl">

<img id="base">

<img id="boobs">

<img id="bottom">

<img id="top">

<img id="jacket">

<img id="effect">

<img id="face">

</div>

<button id="bag">🎒</button>

<div id="inventory">

<h3>Dress</h3>

<div class="item" onclick="showTop()">Wear Top</div>

<div class="item" onclick="hideTop()">Remove Top</div>

<div class="item" onclick="showBottom()">Wear Bottom</div>

<div class="item" onclick="hideBottom()">Remove Bottom</div>

<div class="item" onclick="showJacket()">Wear Jacket</div>

<div class="item" onclick="hideJacket()">Remove Jacket</div>

<h3>Expression</h3>

<div class="item" onclick="setFace(1)">Happy</div>

<div class="item" onclick="setFace(2)">Normal</div>

<div class="item" onclick="setFace(3)">Angry</div>

<div class="item" onclick="setFace(4)">Sad</div>

<div class="item" onclick="setFace(5)">Shy</div>

<div class="item" onclick="setFace(6)">Surprise</div>

<h3>Effects</h3>

<div class="item" onclick="blush1()">Blush 1</div>

<div class="item" onclick="blush2()">Blush 2</div>

<div class="item" onclick="sweat()">Sweat</div>

<div class="item" onclick="slime()">Slime</div>

<div class="item" onclick="clearEffect()">Clear</div>

</div>

<script src="app.js"></script>

</body>
</html>
