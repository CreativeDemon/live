<!DOCTYPE html>
<html>

<head>
  <meta charset="utf-8">
  <title>Izumi Live2D</title>
  
  <style>
    body {
      margin: 0;
      overflow: hidden;
      background: #000;
    }
    
    canvas {
      display: block;
    }
    
    #menu {
      position: fixed;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      width: 360px;
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 10px;
      z-index: 999;
    }
    
    #menu button {
      width: 55px;
      height: 55px;
      border: none;
      border-radius: 50%;
      background: #222;
      color: #fff;
      font-size: 24px;
    }
    
    #menu button:active {
      transform: scale(.9);
    }
  </style>
  
  <script src="./libs/pixi.min.js"></script>
  <script src="./libs/live2dcubismcore.min.js"></script>
  <script src="./libs/cubism4.min.js"></script>
  
</head>

<body>
  
  <div id="menu">
    
    <button onclick="smile()">😊</button>
    
    <button onclick="sad()">😭</button>
    
    <button onclick="angry()">😡</button>
    
    <button onclick="surprised()">😲</button>
    
    <button onclick="blush()">😳</button>
    
    <button onclick="f01()">❤️</button>
    
    <button onclick="normal()">😐</button>
    
    <button onclick="idle()">💤</button>
    
    <button onclick="tap()">👋</button>
    
    <button onclick="left()">⬅️</button>
    
    <button onclick="right()">➡️</button>
    
    <button onclick="shake()">🌪</button>
    
    <button onclick="eyeClose()">🙈</button>
    
    <button onclick="eyeOpen()">👀</button>
    
    <button onclick="armLeft()">✋</button>
    
    <button onclick="armRight()">🤚</button>
    
    <button onclick="hideClothes()">👗❌</button>
    
    <button onclick="showClothes()">👗</button>
    
    <button onclick="zoomIn()">➕</button>
    
    <button onclick="zoomOut()">➖</button>
    
  </div>
  
  <script src="./app.js"></script>
  
</body>

</html>
